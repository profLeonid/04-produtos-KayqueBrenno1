<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./main.js" defer></script>
    <title>Produtos</title>
</head>

<body class="bg-gray-200 flex flex-col items-center justify-center h-screen gap-5">
    <h1 class="text-2xl mb-3">Lista de Produtos</h1>
    <div>
        <p class="text-white text-center bg-purple-500 rounded-t-lg border border-black">Código</p>
        <input 
            type="text" 
            class="border px-4 py-2 rounded-b-lg bg-white"
            id="codigo"
        >
    </div>
    <div>
        <p class="text-white text-center bg-purple-500 rounded-t-lg border border-black">Produto</p>
        <input 
            type="text" 
            class="border px-4 py-2 rounded-b-lg bg-white"
            id="produto"
        >
    </div>
    <div>
        <p class="text-white text-center bg-purple-500 rounded-t-lg border border-black">Quantidade</p>
        <input 
            type="text" 
            class="border px-4 py-2 rounded-b-lg bg-white"
            id="quantidade"
        >
    </div>
    <button 
        class="border-2 border-black px-6 py-2 rounded hover:bg-purple-500 hover:text-white transition-all duration-300"
        onclick="adicionarProduto()"
    >
        Adicionar
    </button>
    <div
        id="lista"
        class="flex flex-col gap-2"
    ></div>
</body>

</html>
